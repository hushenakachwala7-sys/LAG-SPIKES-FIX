name: Build Jar

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build project
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
            ./gradlew build
          elif [ -f pom.xml ]; then
            mvn package
          else
            echo "No build tool found"
          fi

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: |
            **/build/libs/*.jar
            **/target/*.jar
